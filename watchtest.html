<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="origin-when-cross-origin">
  <title>Custom-protocol shell test</title>
  <style>
    body { margin: 0; padding: 20px; background: #111; color: #eee; font-family: Arial, sans-serif; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 20px; }
    h2 { font-size: 14px; color: #9cf; margin: 12px 0 6px; }
    .box { background: #1c1c1c; border: 1px solid #333; border-radius: 8px; padding: 12px; margin: 12px 0; }
    .player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; }
    input { padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; font-family: monospace; font-size: 12px; min-width: 220px; }
    button { padding: 6px 10px; background: #2a6; border: 0; color: #fff; border-radius: 4px; cursor: pointer; margin: 2px; font-size: 12px; }
    button:hover { background: #3b7; }
    .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .logs { background: #0a0a0a; border: 1px solid #333; border-radius: 6px; padding: 8px; max-height: 280px; overflow: auto; font-family: monospace; font-size: 11px; white-space: pre-wrap; }
    .log-info { color: #ccc; }
    .log-event { color: #9cf; }
    .log-good { color: #6f6; }
    .log-bad { color: #f66; }
    .stat { display: inline-block; padding: 2px 8px; background: #2a2a2a; border-radius: 3px; margin-right: 6px; font-size: 11px; }
    .stat.good { background: #163; }
    code { background: #292929; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
<div class="wrap">

  <h1>Custom-protocol shell test</h1>

  <div class="box">
    <div class="row">
      <span>Shell base:</span>
      <input id="hostInput" type="text" value="https://purifyvideo.com">
      <span>Video:</span>
      <input id="videoInput" type="text" value="dQw4w9WgXcQ" style="min-width: 130px;">
      <button onclick="load()">Load</button>
    </div>
  </div>

  <div class="box">
    <h2>Status</h2>
    <span class="stat" id="stat-ready">ready: -</span>
    <span class="stat" id="stat-state">state: -</span>
    <span class="stat" id="stat-time">time: -</span>
    <span class="stat" id="stat-duration">duration: -</span>
  </div>

  <div class="box">
    <div class="player-wrap">
      <iframe id="shellFrame"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen *"
              referrerpolicy="origin-when-cross-origin"
              allowfullscreen></iframe>
    </div>
  </div>

  <div class="box">
    <h2>Controls</h2>
    <div class="row">
      <button onclick="cmd('play')">play</button>
      <button onclick="cmd('pause')">pause</button>
      <button onclick="cmd('stop')">stop</button>
      <button onclick="cmd('mute')">mute</button>
      <button onclick="cmd('unMute')">unmute</button>
      <button onclick="cmd('seekTo', {seconds: 30, allowSeekAhead: true})">seek 30s</button>
      <button onclick="cmd('setVolume', {volume: 50})">vol 50</button>
      <button onclick="cmd('setPlaybackRate', {rate: 1.5})">rate 1.5x</button>
      <button onclick="get('getCurrentTime')">getCurrentTime</button>
      <button onclick="get('getDuration')">getDuration</button>
      <button onclick="get('getPlayerState')">getPlayerState</button>
      <button onclick="get('getVideoData')">getVideoData</button>
    </div>
  </div>

  <div class="box">
    <h2>Log</h2>
    <div id="log" class="logs"></div>
  </div>

</div>

<script>
  var shellOrigin = '';
  var nextRequestId = 1;
  var pendingRequests = {};
  var pollInterval = null;

  function log(msg, cls) {
    var el = document.getElementById('log');
    var div = document.createElement('div');
    div.className = 'log-' + (cls || 'info');
    div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function setStat(id, val, good) {
    var el = document.getElementById('stat-' + id);
    el.textContent = id + ': ' + val;
    if (good) el.className = 'stat good';
  }

  function load() {
    var host = document.getElementById('hostInput').value.trim();
    var videoId = document.getElementById('videoInput').value.trim();

    if (!host || !videoId) return;

    shellOrigin = host;

    // Stop any previous polling.
    if (pollInterval) clearInterval(pollInterval);

    setStat('ready', 'loading');
    setStat('state', '-');

    // Build the shell URL with player vars baked into the query.
    var params = new URLSearchParams();
    params.set('parentOrigin', window.location.origin);
    params.set('playsinline', '1');
    params.set('rel', '0');

    var src = host + '/embed/' + encodeURIComponent(videoId) + '?' + params.toString();
    log('Loading shell: ' + src);

    document.getElementById('shellFrame').src = src;
  }

  // Send a command to the shell.
  function cmd(action, extra) {
    var iframe = document.getElementById('shellFrame');
    if (!iframe.contentWindow) { log('iframe not ready', 'bad'); return; }

    var msg = Object.assign({ action: action }, extra || {});
    iframe.contentWindow.postMessage(msg, shellOrigin || '*');
    log('→ ' + action + (extra ? ' ' + JSON.stringify(extra) : ''));
  }

  // Get a property value via the shell (async).
  function get(property) {
    var iframe = document.getElementById('shellFrame');
    if (!iframe.contentWindow) { log('iframe not ready', 'bad'); return; }

    var requestId = nextRequestId++;
    pendingRequests[requestId] = property;

    iframe.contentWindow.postMessage(
      { action: 'get', property: property, requestId: requestId },
      shellOrigin || '*'
    );
    log('→ get ' + property);
  }

  function stateName(s) {
    return {0:'ENDED',1:'PLAYING',2:'PAUSED',3:'BUFFERING',5:'CUED','-1':'UNSTARTED'}[s] || s;
  }

  // Listen for messages from the shell.
  window.addEventListener('message', function (event) {
    // Filter to expected shell origin.
    if (shellOrigin && event.origin !== shellOrigin) return;
    if (!event.data || typeof event.data !== 'object') return;

    var data = event.data;

    if (data.event === 'ready') {
      log('← ready', 'good');
      setStat('ready', 'YES', true);
      // Start polling for current time.
      pollInterval = setInterval(function () {
        get('getCurrentTime');
        get('getDuration');
      }, 1000);
      return;
    }

    if (data.event === 'stateChange') {
      log('← stateChange: ' + stateName(data.state), 'event');
      setStat('state', stateName(data.state), true);
      return;
    }

    if (data.event === 'response') {
      var prop = data.property;
      var val = data.value;
      delete pendingRequests[data.requestId];

      // Update stats for known properties.
      if (prop === 'getCurrentTime' && typeof val === 'number') {
        setStat('time', Math.round(val) + 's', true);
      } else if (prop === 'getDuration' && typeof val === 'number') {
        setStat('duration', Math.round(val) + 's', true);
      } else {
        log('← ' + prop + ' = ' + JSON.stringify(val), 'good');
      }
      return;
    }

    if (data.event === 'error') {
      log('← error: ' + (data.code || data.message), 'bad');
      return;
    }

    log('← ' + JSON.stringify(data), 'info');
  });
</script>
</body>
</html>
