<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>purify video – watch purified YouTube videos with no ads</title>
  <meta name="description" content="Watch purified YouTube videos with no ads. Just focus." />

  <!-- Keep this so Google Search Console verification stays active. -->
  <meta name="google-site-verification" content="HggK7KBADvrDMO0csH7fA6nbskBG9TepblYhkGOiljE" />

  <!-- Tell Google the new official page is purify.video. -->
  <link rel="canonical" href="https://purify.video/" />

  <script>
    (function () {
      var HOME = 'https://purify.video/';

      function isVideoId(value) {
        return /^[A-Za-z0-9_-]{11}$/.test(value || '');
      }

      function isPlaylistId(value) {
        return /^[A-Za-z0-9_-]{10,}$/.test(value || '');
      }

      function buildWatchUrl(videoId, listId, startTime) {
        var params = new URLSearchParams();

        if (isVideoId(videoId)) {
          params.set('v', videoId);
        }

        if (isPlaylistId(listId)) {
          params.set('list', listId);
        }

        if (startTime) {
          params.set('t', startTime);
        }

        return params.toString()
          ? 'https://purify.video/watch?' + params.toString()
          : HOME;
      }

      try {
        var params = new URLSearchParams(window.location.search);
        var vParam = params.get('v');
        var listParam = params.get('list');
        var tParam = params.get('t');

        /*
          Old Purify format:
          ?v=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DVIDEO_ID
        */
        if (vParam && /^https?:\/\//i.test(vParam)) {
          var yt = new URL(vParam);
          var host = yt.hostname.replace(/^www\./, '').toLowerCase();

          var videoId = yt.searchParams.get('v') || '';
          var playlistId = yt.searchParams.get('list') || '';
          var startTime = yt.searchParams.get('t') || yt.searchParams.get('start') || '';

          if (host === 'youtu.be' && !videoId) {
            videoId = yt.pathname.replace(/^\/+/, '').split('/')[0];
          }

          if ((host === 'youtube.com' || host.endsWith('.youtube.com')) && yt.pathname.indexOf('/shorts/') === 0) {
            videoId = yt.pathname.split('/shorts/')[1].split(/[/?#]/)[0];
          }

          if ((host === 'youtube.com' || host.endsWith('.youtube.com')) && yt.pathname.indexOf('/embed/') === 0) {
            videoId = yt.pathname.split('/embed/')[1].split(/[/?#]/)[0];
          }

          window.location.replace(buildWatchUrl(videoId, playlistId, startTime));
          return;
        }

        /*
          Clean-ish old format, just in case:
          ?v=VIDEO_ID
        */
        if (isVideoId(vParam) || isPlaylistId(listParam)) {
          window.location.replace(buildWatchUrl(vParam, listParam, tParam));
          return;
        }

        /*
          Playlist-only old format:
          ?list=PLAYLIST_ID
        */
        if (isPlaylistId(listParam)) {
          window.location.replace(buildWatchUrl('', listParam, tParam));
          return;
        }

        /*
          Homepage or anything unknown.
        */
        window.location.replace(HOME);
      } catch (e) {
        window.location.replace(HOME);
      }
    })();
  </script>

  <!-- Fallback for browsers/crawlers that do not run JavaScript immediately. -->
  <meta http-equiv="refresh" content="1; url=https://purify.video/" />
</head>

<body>
  <main style="font-family: Arial, sans-serif; max-width: 720px; margin: 4rem auto; padding: 1rem; text-align: center;">
    <h1>Purify Video has moved</h1>
    <p>The official domain is now <a href="https://purify.video/">purify.video</a>.</p>
    <p>If you are not redirected automatically, <a href="https://purify.video/">continue to Purify Video</a>.</p>
  </main>
</body>
</html>
